<!DOCTYPE html>
<html lang="pt-br" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{titulo_index}}</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='css/var.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='css/login/login.css') }}">
</head>
<body>
    <main class="app">
        <section class="app__form">
            <div class="app__banner">
                <img src="{{ url_for('static',filename='images/banner.jpg') }}" alt="imagem ilustrativa">
            </div>
            <div class="app__inputs">
                <div class="app__inputs-copy">
                    <h1>Login</h1>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alerta alerta--{{ category }}">
                        {{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}
                <form action="{{ url_for('autenticar') }}" method="post">
                    <fieldset class="container__input">
                        <label for="iuser" class="input__title">Usuario</label>
                        <input type="text" name="user" id="iuser" class="input__style user__icon">
                        <span class="erro__input"></span>
                    </fieldset>
                    <fieldset class="container__input">
                        <label for="ipass" class="input__title">Senha</label>
                        <input type="password" name="pass" id="ipass" class="input__style pass__icon">
                        <span class="erro__input"></span>
                    </fieldset>
                    <fieldset class="container__input">
                        <input type="submit" class="button__style" value="Entrar">
                    </fieldset>
                </form>

                <fieldset class="container__input">
                    <input type="button" class="button__style" value="Cadastrar" onclick="window.location.href='{{ url_for('cadastrar') }}'">
                </fieldset>
            </div>
        </section>
    </main>
</body>
</html>
